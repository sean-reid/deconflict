<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460">
  <style>
    .wall { stroke: #1a1a1a; stroke-width: 5; fill: none; stroke-linecap: round; }
    .iwall { stroke: #1a1a1a; stroke-width: 3.5; fill: none; stroke-linecap: round; }
    .glass { stroke: #1a1a1a; stroke-width: 1.2; fill: none; stroke-dasharray: 8,4; }
    .door { fill: none; stroke: #1a1a1a; stroke-width: 1.5; }
    .window { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    .fixture { fill: none; stroke: #555; stroke-width: 1; }
    .desk { fill: none; stroke: #888; stroke-width: 0.8; }
    .label { font-family: sans-serif; font-size: 11px; fill: #999; text-anchor: middle; }
    .dim { font-family: sans-serif; font-size: 10px; fill: #bbb; text-anchor: middle; }
  </style>
  <rect x="0" y="0" width="700" height="460" fill="#fff"/>

  <!-- Outer walls -->
  <line x1="20" y1="20" x2="680" y2="20" class="wall"/>
  <line x1="680" y1="20" x2="680" y2="420" class="wall"/>
  <!-- Bottom wall with main entrance gap -->
  <line x1="20" y1="420" x2="310" y2="420" class="wall"/>
  <line x1="360" y1="420" x2="680" y2="420" class="wall"/>
  <line x1="20" y1="20" x2="20" y2="420" class="wall"/>

  <!-- Main entrance door -->
  <path d="M 310 420 A 50 50 0 0 1 310 370" class="door"/>
  <path d="M 360 420 A 50 50 0 0 0 360 370" class="door"/>

  <!-- Windows - top wall -->
  <line x1="60" y1="18" x2="160" y2="18" class="window"/>
  <line x1="60" y1="22" x2="160" y2="22" class="window"/>
  <line x1="200" y1="18" x2="320" y2="18" class="window"/>
  <line x1="200" y1="22" x2="320" y2="22" class="window"/>
  <line x1="520" y1="18" x2="650" y2="18" class="window"/>
  <line x1="520" y1="22" x2="650" y2="22" class="window"/>

  <!-- Windows - right wall -->
  <line x1="678" y1="60" x2="678" y2="170" class="window"/>
  <line x1="682" y1="60" x2="682" y2="170" class="window"/>

  <!-- Main corridor walls -->
  <line x1="20" y1="195" x2="680" y2="195" class="iwall"/>
  <line x1="20" y1="235" x2="680" y2="235" class="iwall"/>

  <!-- Conference room (glass walls) -->
  <line x1="340" y1="20" x2="340" y2="105" class="iwall"/>
  <line x1="340" y1="105" x2="500" y2="105" class="glass"/>
  <line x1="500" y1="20" x2="500" y2="105" class="iwall"/>
  <!-- Conference door -->
  <line x1="340" y1="105" x2="340" y2="155" style="stroke:none"/>
  <line x1="340" y1="155" x2="340" y2="195" class="iwall"/>
  <line x1="340" y1="105" x2="340" y2="145" class="iwall"/>
  <path d="M 340 145 A 40 40 0 0 0 380 145" class="door"/>

  <!-- Meeting room below conference -->
  <line x1="340" y1="105" x2="340" y2="195" class="iwall"/>
  <line x1="500" y1="105" x2="500" y2="195" class="iwall"/>

  <!-- Exec office -->
  <line x1="580" y1="20" x2="580" y2="155" class="iwall"/>
  <line x1="580" y1="195" x2="580" y2="195" class="iwall"/>
  <!-- Exec door -->
  <line x1="580" y1="155" x2="580" y2="195" style="stroke:none"/>
  <path d="M 580 155 A 40 40 0 0 0 580 195" class="door"/>

  <!-- Open office divider (low partition, dashed) -->
  <line x1="180" y1="20" x2="180" y2="195" class="iwall" stroke-dasharray="6,6" stroke-width="1.5"/>

  <!-- Bottom row rooms -->
  <!-- Office 1 -->
  <line x1="140" y1="235" x2="140" y2="380" class="iwall"/>
  <line x1="140" y1="420" x2="140" y2="420" class="iwall"/>
  <path d="M 140 380 A 40 40 0 0 0 140 420" class="door"/>

  <!-- Office 2 -->
  <line x1="280" y1="235" x2="280" y2="380" class="iwall"/>
  <line x1="280" y1="420" x2="280" y2="420" class="iwall"/>
  <path d="M 280 380 A 40 40 0 0 1 280 420" class="door"/>

  <!-- Server room -->
  <line x1="420" y1="235" x2="420" y2="420" class="iwall"/>
  <!-- Server room door -->
  <line x1="420" y1="235" x2="420" y2="275" class="iwall"/>
  <line x1="420" y1="315" x2="420" y2="420" class="iwall"/>
  <path d="M 420 275 A 40 40 0 0 0 420 315" class="door"/>

  <!-- Server room horizontal split -->
  <line x1="420" y1="330" x2="560" y2="330" class="iwall"/>

  <!-- Restroom block -->
  <line x1="560" y1="235" x2="560" y2="420" class="iwall"/>
  <line x1="560" y1="330" x2="680" y2="330" class="iwall"/>
  <!-- Restroom door -->
  <line x1="560" y1="275" x2="560" y2="315" style="stroke:none"/>
  <path d="M 560 275 A 40 40 0 0 1 560 315" class="door"/>

  <!-- Conference table -->
  <rect x="380" y="40" width="80" height="50" rx="5" class="fixture"/>

  <!-- Desks in open office -->
  <rect x="40" y="50" width="50" height="25" rx="2" class="desk"/>
  <rect x="40" y="90" width="50" height="25" rx="2" class="desk"/>
  <rect x="40" y="130" width="50" height="25" rx="2" class="desk"/>
  <rect x="110" y="50" width="50" height="25" rx="2" class="desk"/>
  <rect x="110" y="90" width="50" height="25" rx="2" class="desk"/>
  <rect x="110" y="130" width="50" height="25" rx="2" class="desk"/>
  <rect x="200" y="50" width="50" height="25" rx="2" class="desk"/>
  <rect x="200" y="90" width="50" height="25" rx="2" class="desk"/>
  <rect x="270" y="50" width="50" height="25" rx="2" class="desk"/>
  <rect x="270" y="90" width="50" height="25" rx="2" class="desk"/>

  <!-- Exec desk -->
  <rect x="600" y="60" width="55" height="30" rx="3" class="desk"/>

  <!-- Server racks -->
  <rect x="440" y="250" width="15" height="60" rx="1" class="fixture"/>
  <rect x="465" y="250" width="15" height="60" rx="1" class="fixture"/>
  <rect x="490" y="250" width="15" height="60" rx="1" class="fixture"/>
  <rect x="520" y="250" width="15" height="60" rx="1" class="fixture"/>

  <!-- Restroom fixtures -->
  <rect x="575" y="345" width="20" height="15" rx="2" class="fixture"/>
  <rect x="575" y="375" width="20" height="15" rx="2" class="fixture"/>
  <rect x="640" y="345" width="20" height="15" rx="2" class="fixture"/>
  <rect x="640" y="375" width="20" height="15" rx="2" class="fixture"/>

  <!-- Labels -->
  <text x="100" y="115" class="label">Open Office</text>
  <text x="260" y="115" class="label">Open Office</text>
  <text x="420" y="75" class="label">Conference</text>
  <text x="420" y="160" class="label">Meeting</text>
  <text x="630" y="115" class="label">Executive</text>
  <text x="350" y="220" class="label">Corridor</text>
  <text x="80" y="340" class="label">Office 1</text>
  <text x="210" y="340" class="label">Office 2</text>
  <text x="350" y="340" class="label">Lobby</text>
  <text x="490" y="295" class="label">Server Room</text>
  <text x="490" y="385" class="label">Break Room</text>
  <text x="620" y="290" class="label">Storage</text>
  <text x="620" y="385" class="label">Restrooms</text>
  <text x="350" y="450" class="dim">20m x 15m = 300 sqm</text>
</svg>
