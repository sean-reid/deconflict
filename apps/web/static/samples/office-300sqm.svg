<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460">
  <style>
    .wall { stroke: #1a1a1a; stroke-width: 4; fill: none; }
    .wall-thin { stroke: #1a1a1a; stroke-width: 3; fill: none; }
    .label { font-family: sans-serif; font-size: 11px; fill: #999; text-anchor: middle; }
    .dim { font-family: sans-serif; font-size: 10px; fill: #bbb; text-anchor: middle; }
  </style>
  <rect x="0" y="0" width="700" height="460" fill="#fff"/>

  <!-- Outer walls -->
  <rect x="20" y="20" width="660" height="400" class="wall"/>

  <!-- Main corridor (horizontal) -->
  <line x1="20" y1="200" x2="680" y2="200" class="wall-thin"/>
  <line x1="20" y1="240" x2="680" y2="240" class="wall-thin"/>

  <!-- Top row rooms -->
  <line x1="180" y1="20" x2="180" y2="200" class="wall-thin"/>
  <line x1="340" y1="20" x2="340" y2="200" class="wall-thin"/>
  <line x1="500" y1="20" x2="500" y2="200" class="wall-thin"/>

  <!-- Conference room divider -->
  <line x1="340" y1="110" x2="500" y2="110" class="wall-thin"/>

  <!-- Bottom row rooms -->
  <line x1="140" y1="240" x2="140" y2="420" class="wall-thin"/>
  <line x1="280" y1="240" x2="280" y2="420" class="wall-thin"/>
  <line x1="420" y1="240" x2="420" y2="420" class="wall-thin"/>
  <line x1="560" y1="240" x2="560" y2="420" class="wall-thin"/>

  <!-- Server room internal -->
  <line x1="420" y1="330" x2="560" y2="330" class="wall-thin"/>

  <!-- Restroom divider -->
  <line x1="620" y1="240" x2="620" y2="420" class="wall-thin"/>
  <line x1="620" y1="330" x2="680" y2="330" class="wall-thin"/>

  <!-- Labels -->
  <text x="100" y="115" class="label">Open Office</text>
  <text x="260" y="115" class="label">Open Office</text>
  <text x="420" y="75" class="label">Conference</text>
  <text x="420" y="165" class="label">Meeting</text>
  <text x="590" y="115" class="label">Exec Office</text>
  <text x="350" y="225" class="label">Corridor</text>
  <text x="80" y="340" class="label">Office 1</text>
  <text x="210" y="340" class="label">Office 2</text>
  <text x="350" y="340" class="label">Lobby</text>
  <text x="490" y="295" class="label">Server Room</text>
  <text x="490" y="385" class="label">Break Room</text>
  <text x="590" y="295" class="label">Supply</text>
  <text x="650" y="385" class="label">WC</text>

  <!-- Dimensions -->
  <text x="350" y="450" class="dim">20m x 15m = 300 sqm</text>
</svg>
