<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" width="440" height="360">
  <style>
    .wall { stroke: #1a1a1a; stroke-width: 5; fill: none; stroke-linecap: round; }
    .iwall { stroke: #1a1a1a; stroke-width: 3.5; fill: none; stroke-linecap: round; }
    .door { fill: none; stroke: #1a1a1a; stroke-width: 1.5; }
    .window { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    .fixture { fill: none; stroke: #555; stroke-width: 1; }
    .label { font-family: sans-serif; font-size: 12px; fill: #999; text-anchor: middle; }
    .dim { font-family: sans-serif; font-size: 10px; fill: #bbb; text-anchor: middle; }
  </style>
  <rect x="0" y="0" width="440" height="360" fill="#fff"/>

  <!-- Outer walls with door/window gaps -->
  <!-- Top wall -->
  <line x1="20" y1="20" x2="420" y2="20" class="wall"/>
  <!-- Bottom wall with front door gap -->
  <line x1="20" y1="320" x2="340" y2="320" class="wall"/>
  <line x1="380" y1="320" x2="420" y2="320" class="wall"/>
  <!-- Left wall -->
  <line x1="20" y1="20" x2="20" y2="320" class="wall"/>
  <!-- Right wall -->
  <line x1="420" y1="20" x2="420" y2="320" class="wall"/>

  <!-- Front door arc -->
  <path d="M 340 320 A 40 40 0 0 1 340 280" class="door"/>
  <line x1="340" y1="280" x2="340" y2="320" class="door" stroke-dasharray="2,2"/>

  <!-- Windows on top wall -->
  <line x1="80" y1="18" x2="160" y2="18" class="window"/>
  <line x1="80" y1="22" x2="160" y2="22" class="window"/>
  <line x1="280" y1="18" x2="380" y2="18" class="window"/>
  <line x1="280" y1="22" x2="380" y2="22" class="window"/>

  <!-- Window on left wall -->
  <line x1="18" y1="80" x2="18" y2="150" class="window"/>
  <line x1="22" y1="80" x2="22" y2="150" class="window"/>

  <!-- Horizontal divider (top/bottom) with door gap to hall -->
  <line x1="20" y1="170" x2="300" y2="170" class="iwall"/>
  <line x1="340" y1="170" x2="420" y2="170" class="iwall"/>
  <!-- Door arc from hall to living area -->
  <path d="M 300 170 A 40 40 0 0 0 340 170" class="door"/>

  <!-- Kitchen divider with pass-through gap -->
  <line x1="240" y1="20" x2="240" y2="120" class="iwall"/>

  <!-- Bedroom | Bath | Hall dividers -->
  <line x1="180" y1="170" x2="180" y2="320" class="iwall"/>
  <!-- Bath/Hall divider with door gap -->
  <line x1="290" y1="170" x2="290" y2="230" class="iwall"/>
  <line x1="290" y1="270" x2="290" y2="320" class="iwall"/>
  <!-- Bath door arc -->
  <path d="M 290 270 A 40 40 0 0 1 290 230" class="door"/>

  <!-- Bathroom horizontal wall with door gap -->
  <line x1="180" y1="250" x2="220" y2="250" class="iwall"/>
  <line x1="260" y1="250" x2="290" y2="250" class="iwall"/>
  <!-- Bathroom door arc -->
  <path d="M 220 250 A 40 40 0 0 0 260 250" class="door"/>

  <!-- Bedroom door -->
  <line x1="180" y1="200" x2="180" y2="240" style="stroke:#fff;stroke-width:5"/>
  <line x1="180" y1="200" x2="180" y2="240" style="stroke:none"/>
  <!-- Actually do gap + arc -->
  <!-- Erase the iwall segment for bedroom door -->

  <!-- Bathroom fixtures -->
  <rect x="195" y="260" width="30" height="15" rx="2" class="fixture"/>
  <circle cx="270" cy="290" r="10" class="fixture"/>
  <rect x="250" y="255" width="15" height="12" rx="1" class="fixture"/>

  <!-- Kitchen fixtures -->
  <rect x="250" y="25" width="80" height="15" rx="2" class="fixture"/>
  <rect x="410" y="40" width="5" height="60" rx="1" class="fixture"/>

  <!-- Labels (stripped by prepareSvgForDetection) -->
  <text x="125" y="100" class="label">Living Room</text>
  <text x="340" y="85" class="label">Kitchen</text>
  <text x="95" y="255" class="label">Bedroom</text>
  <text x="235" y="220" class="label">Bathroom</text>
  <text x="358" y="250" class="label">Hall</text>
  <text x="220" y="350" class="dim">8m x 6m = 48 sqm</text>
</svg>
