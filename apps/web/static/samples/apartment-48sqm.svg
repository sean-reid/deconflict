<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" width="440" height="360">
  <style>
    .wall { stroke: #1a1a1a; stroke-width: 4; fill: none; }
    .wall-thin { stroke: #1a1a1a; stroke-width: 3; fill: none; }
    .label { font-family: sans-serif; font-size: 13px; fill: #999; text-anchor: middle; }
    .dim { font-family: sans-serif; font-size: 10px; fill: #bbb; text-anchor: middle; }
  </style>
  <rect x="0" y="0" width="440" height="360" fill="#fff"/>

  <!-- Outer walls -->
  <rect x="20" y="20" width="400" height="300" class="wall"/>

  <!-- Horizontal divider (top/bottom halves) -->
  <line x1="20" y1="170" x2="420" y2="170" class="wall"/>

  <!-- Top half: Living + Kitchen -->
  <line x1="240" y1="20" x2="240" y2="130" class="wall-thin"/>
  <!-- Door gap in kitchen divider -->

  <!-- Bottom half: Bedroom | Bath | Hall -->
  <line x1="180" y1="170" x2="180" y2="320" class="wall-thin"/>
  <line x1="290" y1="170" x2="290" y2="320" class="wall-thin"/>

  <!-- Bathroom internal wall -->
  <line x1="180" y1="250" x2="290" y2="250" class="wall-thin"/>

  <!-- Front door -->
  <line x1="350" y1="320" x2="370" y2="320" style="stroke:#666;stroke-width:2;stroke-dasharray:4,3"/>

  <!-- Labels (stripped by prepareSvgForDetection) -->
  <text x="130" y="100" class="label">Living</text>
  <text x="340" y="100" class="label">Kitchen</text>
  <text x="100" y="250" class="label">Bedroom</text>
  <text x="235" y="215" class="label">Bath</text>
  <text x="355" y="250" class="label">Hall</text>

  <!-- Dimensions -->
  <text x="220" y="350" class="dim">8m x 6m = 48 sqm</text>
</svg>
