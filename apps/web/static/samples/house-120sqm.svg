<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <style>
    .wall { stroke: #1a1a1a; stroke-width: 5; fill: none; stroke-linecap: round; }
    .iwall { stroke: #1a1a1a; stroke-width: 3.5; fill: none; stroke-linecap: round; }
    .door { fill: none; stroke: #1a1a1a; stroke-width: 1.5; }
    .window { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    .fixture { fill: none; stroke: #555; stroke-width: 1; }
    .label { font-family: sans-serif; font-size: 11px; fill: #999; text-anchor: middle; }
    .dim { font-family: sans-serif; font-size: 10px; fill: #bbb; text-anchor: middle; }
  </style>
  <rect x="0" y="0" width="600" height="500" fill="#fff"/>

  <!-- L-shaped outer walls -->
  <!-- Top-left block -->
  <line x1="30" y1="30" x2="390" y2="30" class="wall"/>
  <line x1="30" y1="30" x2="30" y2="470" class="wall"/>
  <line x1="30" y1="470" x2="570" y2="470" class="wall"/>
  <line x1="570" y1="470" x2="570" y2="190" class="wall"/>
  <line x1="570" y1="190" x2="390" y2="190" class="wall"/>
  <line x1="390" y1="30" x2="390" y2="190" class="wall"/>

  <!-- Windows - top wall -->
  <line x1="80" y1="28" x2="170" y2="28" class="window"/>
  <line x1="80" y1="32" x2="170" y2="32" class="window"/>
  <line x1="220" y1="28" x2="340" y2="28" class="window"/>
  <line x1="220" y1="32" x2="340" y2="32" class="window"/>

  <!-- Windows - right wall -->
  <line x1="568" y1="250" x2="568" y2="350" class="window"/>
  <line x1="572" y1="250" x2="572" y2="350" class="window"/>

  <!-- Windows - bottom wall -->
  <line x1="100" y1="468" x2="200" y2="468" class="window"/>
  <line x1="100" y1="472" x2="200" y2="472" class="window"/>

  <!-- Windows - left wall -->
  <line x1="28" y1="80" x2="28" y2="170" class="window"/>
  <line x1="32" y1="80" x2="32" y2="170" class="window"/>
  <line x1="28" y1="300" x2="28" y2="390" class="window"/>
  <line x1="32" y1="300" x2="32" y2="390" class="window"/>

  <!-- Central horizontal corridor wall -->
  <line x1="30" y1="250" x2="170" y2="250" class="iwall"/>
  <line x1="210" y1="250" x2="390" y2="250" class="iwall"/>
  <!-- Door to kitchen -->
  <path d="M 170 250 A 40 40 0 0 1 210 250" class="door"/>

  <!-- Living / Master divider -->
  <line x1="210" y1="30" x2="210" y2="200" class="iwall"/>
  <line x1="210" y1="200" x2="210" y2="250" style="stroke:#fff;stroke-width:5"/>
  <!-- Door gap + arc -->
  <line x1="210" y1="30" x2="210" y2="110" class="iwall"/>
  <line x1="210" y1="150" x2="210" y2="250" class="iwall"/>
  <path d="M 210 110 A 40 40 0 0 0 210 150" class="door"/>

  <!-- Kitchen / Dining divider -->
  <line x1="210" y1="250" x2="210" y2="350" class="iwall"/>

  <!-- Bottom rooms corridor -->
  <line x1="30" y1="350" x2="390" y2="350" class="iwall"/>

  <!-- Bedroom 2 / Bath divider -->
  <line x1="160" y1="350" x2="160" y2="420" class="iwall"/>
  <line x1="160" y1="460" x2="160" y2="470" class="iwall"/>
  <path d="M 160 420 A 40 40 0 0 0 160 460" class="door"/>

  <!-- Bath / Laundry divider -->
  <line x1="270" y1="350" x2="270" y2="470" class="iwall"/>

  <!-- Family room / Study divider -->
  <line x1="390" y1="350" x2="570" y2="350" class="iwall"/>

  <!-- Right wing rooms -->
  <line x1="390" y1="190" x2="390" y2="470" class="iwall"/>
  <!-- Door from corridor to family room -->
  <line x1="390" y1="280" x2="390" y2="320" style="stroke:#fff;stroke-width:5"/>
  <line x1="390" y1="190" x2="390" y2="280" class="iwall"/>
  <line x1="390" y1="320" x2="390" y2="470" class="iwall"/>
  <path d="M 390 280 A 40 40 0 0 1 390 320" class="door"/>

  <!-- Front door (bottom-right) -->
  <line x1="440" y1="470" x2="480" y2="470" style="stroke:#fff;stroke-width:6"/>
  <line x1="440" y1="470" x2="440" y2="470" class="wall"/>
  <line x1="480" y1="470" x2="480" y2="470" class="wall"/>
  <path d="M 440 470 A 40 40 0 0 1 440 430" class="door"/>

  <!-- Bathroom fixtures -->
  <rect x="175" y="380" width="35" height="18" rx="3" class="fixture"/>
  <circle cx="240" cy="430" r="12" class="fixture"/>
  <rect x="175" y="440" width="20" height="15" rx="2" class="fixture"/>

  <!-- Kitchen fixtures -->
  <rect x="35" y="255" width="100" height="12" rx="2" class="fixture"/>
  <rect x="35" y="280" width="12" height="50" rx="2" class="fixture"/>

  <!-- Labels -->
  <text x="115" y="150" class="label">Living Room</text>
  <text x="300" y="140" class="label">Master Bedroom</text>
  <text x="115" y="310" class="label">Kitchen</text>
  <text x="300" y="310" class="label">Dining</text>
  <text x="90" y="420" class="label">Bedroom 2</text>
  <text x="215" y="420" class="label">Bath</text>
  <text x="330" y="420" class="label">Laundry</text>
  <text x="480" y="280" class="label">Family Room</text>
  <text x="480" y="420" class="label">Study</text>
  <text x="300" y="493" class="dim">12m x 10m = 120 sqm</text>
</svg>
