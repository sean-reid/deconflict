name: Deploy

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "production" ]; then
            npx wrangler pages deploy apps/web/build --project-name=deconflict --branch=production
          else
            npx wrangler pages deploy apps/web/build --project-name=deconflict --branch=${{ github.head_ref || github.ref_name }}
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
